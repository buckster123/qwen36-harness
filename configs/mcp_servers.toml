# MCP server registry for the qwen36-harness.
#
# Each entry under [servers.<name>] becomes a long-lived stdio subprocess.
# Tools are registered into the harness registry as `<name>.<tool>`.
#
# Servers default to auto_start=true; flip to false to make a server lazy
# (manually `/mcp start <name>`).

# Filesystem MCP — gives the model read/list/write/search over a sandboxed
# directory. Coexists with our builtin fs.* tools (namespaced separately so
# no collision).
[servers.fs-mcp]
command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/home/andre/qwen36-sandbox"]
auto_start = false   # off by default; opt-in per session via /mcp start fs-mcp
connect_timeout = 60.0  # npx may need to fetch the package on first run

# --- CerebroCortex memory tools ---
# Gives the model access to recall, remember, episode management, dream cycle,
# intention tracking, schema search, etc. All 42 CC tools appear as `cerebro.*`.
[servers.cerebro]
command = ["/home/andre/projects/CerebroCortex/cerebro-mcp"]
auto_start = false   # off by default; /mcp start cerebro to enable
env = { CEREBRO_DATA_DIR="/home/andre/.cerebro-cortex" }

