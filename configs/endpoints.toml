# Endpoints for qwen36-harness.
#
# WARNING: this file may contain bare IPs of rented GPU instances.
# Do not commit real keys here — use endpoints.local.toml (gitignored)
# for anything secret, or environment variables.

[default]
endpoint = "vast-qwen36-moe"

[endpoints.vast-qwen36-moe]
description = "Vast.ai NO 5090 via SSH tunnel (127.0.0.1:8800), Qwen3.6-35B-A3B Q5_K_XL"
base_url = "http://127.0.0.1:8800/v1"
model    = "Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf"
api_key  = "sk-anything"
default_max_tokens  = 2048
default_temperature = 0.7
mode = "thinking"

